<label class="form-field">
  <span class="form-field__label">Category<span class="required">*</span></span>
  <section
    class="form-field__control"
    [class.is-open]="isDropdownOpen"
    [class.form-field__control--error]="hasError"
    (click)="toggleDropdownOpen($event)"
  >
    <input
      class="form-field__input"
      type="text"
      [placeholder]="'Select task category'"
      [value]="selectedCategoryLabel"
      readonly
    />
    <button
      type="button"
      class="form-field__icon-button"
      aria-label="Toggle category dropdown"
      aria-haspopup="listbox"
      [attr.aria-controls]="dropdownId"
      [attr.aria-expanded]="isDropdownOpen ? 'true' : 'false'"
      (click)="toggleDropdownOpen($event)"
    >
      <img
        class="form-field__icon"
        [class.is-open]="isDropdownOpen"
        src="assets/img/icons/add-task/dropdown-arrow-down.svg" alt="Dropdown arrow icon"
        aria-hidden="true"
      />
    </button>
  </section>

  @if (isDropdownOpen) {
    <section
      class="dropdown"
      [id]="dropdownId"
      role="listbox"
      aria-label="Task category options"
    >
      @for (category of taskService.taskCategories; track category.value) {
        <button
          type="button"
          class="dropdown__item"
          role="option"
          [attr.aria-selected]="selectedCategory?.value === category.value ? 'true' : 'false'"
          (click)="selectCategory(category, $event)"
        >
          <span class="dropdown__name">{{ category.label }}</span>
        </button>
      }
    </section>
  }
</label>

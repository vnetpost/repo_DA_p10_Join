<article
  class="single-contact"
  [class.single-contact--active]="isActive"
  (click)="setContactAsSelected()"
>
  <figure
    class="single-contact__avatar"
    [style.backgroundColor]="getContactAvatarSrc(contact) ? null : contact?.userColor || null"
  >
    @if (getContactAvatarSrc(contact); as avatarSrc) {
      <img class="single-contact__avatar-image" [src]="avatarSrc" alt="" aria-hidden="true" />
    } @else {
      <span class="single-contact__initials">{{ getTwoInitials(contact?.name) }}</span>
    }
  </figure>
  <section class="single-contact__text">
    <h3 class="single-contact__name">{{ contact?.name }}</h3>
    <p class="single-contact__email">{{ contact?.email }}</p>
  </section>
</article>

<section class="contact-info__main">
  <figure
    class="contact-info__avatar"
    [style.backgroundColor]="getContactAvatarSrc(contact) ? null : contact.userColor"
    aria-hidden="true"
  >
    @if (getContactAvatarSrc(contact); as avatarSrc) {
      <img class="contact-info__avatar-image" [src]="avatarSrc" alt="Contact avatar image" aria-hidden="true" />
    } @else {
      <span class="contact-info__initials">{{ getTwoInitials(contact.name) }}</span>
    }
  </figure>

  <section class="contact-info__identity">
    <h2 class="contact-info__name">{{ contact.name }}</h2>

    <nav class="contact-info__actions" aria-label="Contact actions">
      <button class="contact-info__action" type="button" (click)="editContact.emit()">
        <img
          class="contact-info__action-icon"
          src="assets/img/icons/buttons/edit.svg"
          alt="Edit icon"
          aria-hidden="true"
        />
        <span>Edit</span>
      </button>

      @if (canDelete) {
        <button class="contact-info__action" type="button" (click)="requestDelete.emit()">
          <img
            class="contact-info__action-icon"
            src="assets/img/icons/buttons/delete.svg"
            alt="Delete icon"
            aria-hidden="true"
          />
          <span>Delete</span>
        </button>
      }
    </nav>
  </section>
</section>

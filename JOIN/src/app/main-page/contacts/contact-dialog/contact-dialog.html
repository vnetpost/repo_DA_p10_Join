<dialog
  #contactDialog
  (cancel)="onEsc($event)"
  (mousedown)="onBackdropClick($event)"
  role="dialog"
  aria-labelledby="contact-dialog-title"
>
  <article class="dialog-content">
    <header>
      <button
        class="close-btn-mobile mobile-only"
        type="button"
        aria-label="Close contact dialog"
        (click)="requestCloseDialog()"
      >
        <img src="assets/img/icons/buttons/close-white.svg" alt="Close icon" aria-hidden="true" />
      </button>

      <section class="title">
        <img class="logo desktop-only" src="assets/img/icons/logo-light.svg" alt="Join logo" />
        <h1 id="contact-dialog-title">
          @if (dialogMode === 'add') {
            Add contact
          } @else {
            Edit contact
          }
        </h1>
        @if (dialogMode === 'add') {
          <p>Tasks are better with a team!</p>
        }
        <section class="line" aria-hidden="true"></section>
      </section>
    </header>

    <button
      class="close-btn-desktop desktop-only"
      type="button"
      aria-label="Close contact dialog"
      (click)="requestCloseDialog()"
    >
      <img
        class="icon icon--default"
        src="assets/img/icons/buttons/close.svg" alt="Close icon"
        aria-hidden="true"
      />
      <img
        class="icon icon--hover"
        src="assets/img/icons/buttons/close-hover.svg" alt="Close icon"
        aria-hidden="true"
      />
    </button>

    <section class="form-section">
      <app-contact-dialog-avatar
        [dialogMode]="dialogMode"
        [canUploadAvatar]="canUploadAvatar"
        [userColor]="userColor"
        [avatarPreviewSrc]="avatarPreviewSrc"
        [contactName]="contactData.name"
        (avatarUpdated)="applyAvatarChange($event)"
      />

      <form
        class="form"
        #contactForm="ngForm"
        (ngSubmit)="onSubmit(contactForm)"
        novalidate
        autocomplete="off"
      >
        <app-contact-dialog-form-fields
          [contactData]="contactData"
          [dialogMode]="dialogMode"
        />

        <nav class="form__actions" aria-label="Contact form actions">
          @if (dialogMode === 'add') {
            <button
              type="button"
              class="button button--secondary button--icon desktop-only"
              (click)="requestCloseDialog()"
              aria-label="Cancel and close dialog"
            >
              Cancel
              <img
                class="button__icon button__icon--default"
                src="assets/img/icons/buttons/cancel.svg" alt="Cancel icon"
                aria-hidden="true"
              />
              <img
                class="button__icon button__icon--hover"
                src="assets/img/icons/buttons/cancel-hover.svg" alt="Cancel icon"
                aria-hidden="true"
              />
            </button>
          } @else if (canDelete) {
            <button
              type="button"
              class="button button--secondary"
              (click)="requestDelete.emit()"
              aria-label="Delete contact"
            >
              Delete
            </button>
          }
          <button
            type="submit"
            class="button button--primary button--icon"
            [class.button--disabled]="contactForm.invalid || isSubmitting"
            [disabled]="contactForm.invalid || isSubmitting"
            [attr.aria-disabled]="contactForm.invalid || isSubmitting ? 'true' : null"
            aria-label="Save changes"
          >
            @if (dialogMode === 'add') {
              Create contact
            } @else {
              Save
            }
            <img
              class="button__icon"
              src="assets/img/icons/buttons/save.svg" alt="Save icon"
              aria-hidden="true"
            />
          </button>
        </nav>
      </form>
    </section>
  </article>

  @if (showCloseConfirm) {
    <section class="confirm-backdrop">
      <article class="confirm-box" role="dialog" aria-modal="true" aria-label="Close contact dialog confirmation">
        <p><span class="delete-highlight">Close</span> this contact? Your changes will be lost.</p>

        <nav class="confirm-actions" aria-label="Close confirmation actions">
          <button class="button button--primary delete-btn" type="button" (click)="confirmCloseDialog()">
            Close
          </button>
          <button class="button button--secondary" type="button" (click)="cancelCloseDialog()">Cancel</button>
        </nav>
      </article>
    </section>
  }
</dialog>
